<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">2023年から2026年のAI技術トレンド年表</title>
  <desc id="desc">2023年から2026年にかけて、AI活用の主戦場がモデル性能、RAG、ワークフロー、エージェントループ、コンテキスト設計とハーネスへ移った流れを示すインフォグラフィック。</desc>
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .title { fill: #f3f4f6; font: 700 34px "Noto Sans JP", "Segoe UI", sans-serif; }
      .subtitle { fill: #aab4c3; font: 400 17px "Noto Sans JP", "Segoe UI", sans-serif; }
      .year { fill: #ffffff; font: 700 26px "Noto Sans JP", "Segoe UI", sans-serif; }
      .phase { fill: #0f1115; font: 700 18px "Noto Sans JP", "Segoe UI", sans-serif; }
      .body { fill: #d8dee9; font: 500 16px "Noto Sans JP", "Segoe UI", sans-serif; }
      .small { fill: #aab4c3; font: 400 14px "Noto Sans JP", "Segoe UI", sans-serif; }
      .panel { fill: #171b22; stroke: #2d3440; stroke-width: 2; }
      .accent1 { fill: #82aaff; }
      .accent2 { fill: #8bd5a8; }
      .accent3 { fill: #f2cc8f; }
      .accent4 { fill: #f28b82; }
      .accent5 { fill: #c792ea; }
      .line { stroke: #4b5563; stroke-width: 5; fill: none; }
      .dot { stroke: #0f1115; stroke-width: 4; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720" />
  <text class="title" x="54" y="62">AI技術の主戦場は「モデル性能」から「運用設計」へ</text>
  <text class="subtitle" x="56" y="96">2023-2026年の変化を、ビジネスユーザ向けに一枚で整理</text>

  <path class="line" d="M 110 235 H 1090" />

  <circle class="dot accent1" cx="150" cy="235" r="18" />
  <circle class="dot accent2" cx="380" cy="235" r="18" />
  <circle class="dot accent3" cx="610" cy="235" r="18" />
  <circle class="dot accent4" cx="840" cy="235" r="18" />
  <circle class="dot accent5" cx="1060" cy="235" r="18" />

  <rect class="panel" x="58" y="145" width="190" height="150" rx="10" />
  <rect class="accent1" x="78" y="164" width="92" height="34" rx="17" />
  <text class="phase" x="101" y="187">2023</text>
  <text class="year" x="78" y="332">モデル競争</text>
  <text class="body" x="78" y="362">GPT-4、Claude、Gemini</text>
  <text class="small" x="78" y="390">賢さと会話品質が注目</text>

  <rect class="panel" x="288" y="145" width="190" height="150" rx="10" />
  <rect class="accent2" x="308" y="164" width="92" height="34" rx="17" />
  <text class="phase" x="331" y="187">2024</text>
  <text class="year" x="308" y="332">RAG</text>
  <text class="body" x="308" y="362">社内文書・検索連携</text>
  <text class="small" x="308" y="390">資料を根拠に答える</text>

  <rect class="panel" x="518" y="145" width="190" height="150" rx="10" />
  <rect class="accent3" x="538" y="164" width="92" height="34" rx="17" />
  <text class="phase" x="561" y="187">2025</text>
  <text class="year" x="538" y="332">Workflow</text>
  <text class="body" x="538" y="362">業務手順にAIを組み込む</text>
  <text class="small" x="538" y="390">再現性・監査性が強み</text>

  <rect class="panel" x="748" y="145" width="190" height="150" rx="10" />
  <rect class="accent4" x="768" y="164" width="92" height="34" rx="17" />
  <text class="phase" x="791" y="187">2026</text>
  <text class="year" x="768" y="332">Agent Loop</text>
  <text class="body" x="768" y="362">計画、実行、観察、修正</text>
  <text class="small" x="768" y="390">長い作業を回す</text>

  <rect class="panel" x="968" y="145" width="174" height="150" rx="10" />
  <rect class="accent5" x="988" y="164" width="92" height="34" rx="17" />
  <text class="phase" x="1007" y="187">現在</text>
  <text class="year" x="988" y="332">Context</text>
  <text class="body" x="988" y="362">何を見せるかを設計</text>
  <text class="small" x="988" y="390">安全なループ運用へ</text>

  <rect class="panel" x="58" y="455" width="510" height="170" rx="12" />
  <text class="year" x="88" y="500">ビジネスで見るべき変化</text>
  <text class="body" x="90" y="535">昔: 良いプロンプトを書けば成果が出る</text>
  <text class="body" x="90" y="570">今: 仕事の流れ、文脈、承認、検証まで設計する</text>
  <text class="small" x="90" y="602">AI活用は「チャットの使い方」から「業務設計」へ移っている</text>

  <rect class="panel" x="632" y="455" width="510" height="170" rx="12" />
  <text class="year" x="662" y="500">2026年の競争軸</text>
  <text class="body" x="664" y="535">どのモデルが一番賢いか</text>
  <text class="small" x="664" y="560">だけではなくなった</text>
  <text class="body" x="664" y="595">長時間、低コスト、安全にループを回せるか</text>
  <text class="small" x="664" y="620">Workflow、Harness、HITLが企業導入の鍵になる</text>
</svg>
